version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - echo "VOID_REGION=$VOID_REGION" >> .env
        - echo "VOID_ACCESS_KEY_ID=$VOID_ACCESS_KEY_ID" >> .env
        - echo "VOID_SECRET_ACCESS_KEY=$VOID_SECRET_ACCESS_KEY" >> .env
        - echo "COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> .env
        - echo "COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" >> .env
        - echo "COGNITO_CLIENT_SECRET=$COGNITO_CLIENT_SECRET" >> .env
        - echo "DYNAMO_EVENTS_TABLE=$DYNAMO_EVENTS_TABLE" >> .env
        - echo "DYNAMO_NEWSLETTERS_TABLE=$DYNAMO_NEWSLETTERS_TABLE" >> .env
        - echo "DYNAMO_AUDIT_TABLE=$DYNAMO_AUDIT_TABLE" >> .env
        - echo "DYNAMO_TRACKING_TABLE=$DYNAMO_TRACKING_TABLE" >> .env
        - echo "DYNAMO_SENDS_TABLE=$DYNAMO_SENDS_TABLE" >> .env
        - echo "SES_FROM_EMAIL=$SES_FROM_EMAIL" >> .env
        - echo "SES_CONTACT_LIST_NAME=$SES_CONTACT_LIST_NAME" >> .env
        - echo "S3_BUCKET_NAME=$S3_BUCKET_NAME" >> .env
        - echo "NEXT_PUBLIC_S3_BASE_URL=$NEXT_PUBLIC_S3_BASE_URL" >> .env
        - echo "NEXT_PUBLIC_BASE_URL=$NEXT_PUBLIC_BASE_URL" >> .env
        - echo "TOTP_SECRET=$TOTP_SECRET" >> .env
        - echo "DYNAMO_GAMES_TABLE=$DYNAMO_GAMES_TABLE" >> .env
        - echo "DYNAMO_POINTS_TABLE=$DYNAMO_POINTS_TABLE" >> .env
        - echo "DYNAMO_POINT_EVENTS_TABLE=$DYNAMO_POINT_EVENTS_TABLE" >> .env
        - echo "DYNAMO_PLAYERS_TABLE=$DYNAMO_PLAYERS_TABLE" >> .env
        - echo "WS_INTERNAL_SECRET=$WS_INTERNAL_SECRET" >> .env
        - echo "ROUTE53_HOSTED_ZONE_ID=$ROUTE53_HOSTED_ZONE_ID" >> .env
        - echo "EC2_INSTANCE_PROFILE=$EC2_INSTANCE_PROFILE" >> .env
        - echo "EC2_REPO_URL=$EC2_REPO_URL" >> .env
        - echo "EC2_REPO_BRANCH=$EC2_REPO_BRANCH" >> .env
        - echo "EC2_GITHUB_TOKEN=$EC2_GITHUB_TOKEN" >> .env
        - echo "EC2_INSTANCE_TYPE=$EC2_INSTANCE_TYPE" >> .env
        - echo "WS_SERVER_URL=$WS_SERVER_URL" >> .env
        - echo "NEXT_PUBLIC_WS_HOST=$NEXT_PUBLIC_WS_HOST" >> .env
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*