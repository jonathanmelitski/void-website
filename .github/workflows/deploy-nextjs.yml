name: Deploy Next.js (Amplify)

on:
  push:
    branches: [main]
    paths:
      - "nextjs/**"
      - "amplify.yml"
      - ".github/workflows/deploy-nextjs.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.VOID_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.VOID_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.VOID_REGION }}

      - name: Trigger Amplify build
        env:
          APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name main \
            --job-type RELEASE \
            --query 'jobSummary.jobId' \
            --output text)
          echo "Amplify job started: $JOB_ID"
          echo "https://console.aws.amazon.com/amplify/home#/$APP_ID/main/$JOB_ID"
