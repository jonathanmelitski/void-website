name: Deploy Broadcast Worker Lambda

on:
  push:
    branches: [main]
    paths:
      - "broadcast-worker/**"
      - "nextjs/lib/aws/broadcast-jobs.ts"
      - "nextjs/lib/aws/medialive.ts"
      - "nextjs/lib/step-types.ts"
      - ".github/workflows/deploy-broadcast-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bundle
        run: |
          mkdir -p broadcast-worker/dist
          node_modules/.bin/esbuild broadcast-worker/handler.ts \
            --bundle \
            --platform=node \
            --target=node20 \
            --outfile=broadcast-worker/dist/handler.js

      - name: Zip
        run: zip -j broadcast-worker/dist/function.zip broadcast-worker/dist/handler.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.VOID_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.VOID_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.VOID_REGION }}

      - name: Create or update Lambda
        env:
          FUNCTION_NAME: ${{ secrets.BROADCAST_WORKER_FUNCTION_NAME }}
          ROLE_ARN: ${{ secrets.LAMBDA_WORKER_ROLE_ARN }}
        run: |
          ENV_JSON=$(jq -n \
            --arg void_key    "${{ secrets.VOID_ACCESS_KEY_ID }}" \
            --arg void_secret "${{ secrets.VOID_SECRET_ACCESS_KEY }}" \
            --arg void_region "${{ secrets.VOID_REGION }}" \
            --arg dynamo_table "${{ secrets.DYNAMO_BROADCAST_TABLE }}" \
            --arg hosted_zone  "${{ secrets.ROUTE53_HOSTED_ZONE_ID }}" \
            --arg yt_key       "${{ secrets.YOUTUBE_STREAM_KEY }}" \
            '{Variables: {
              VOID_ACCESS_KEY_ID:     $void_key,
              VOID_SECRET_ACCESS_KEY: $void_secret,
              VOID_REGION:            $void_region,
              DYNAMO_BROADCAST_TABLE: $dynamo_table,
              ROUTE53_HOSTED_ZONE_ID: $hosted_zone,
              YOUTUBE_STREAM_KEY:     $yt_key
            }}')

          if aws lambda get-function --function-name "$FUNCTION_NAME" 2>/dev/null; then
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://broadcast-worker/dist/function.zip

            aws lambda wait function-updated \
              --function-name "$FUNCTION_NAME"

            aws lambda update-function-configuration \
              --function-name "$FUNCTION_NAME" \
              --environment "$ENV_JSON"
          else
            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --runtime nodejs20.x \
              --role "$ROLE_ARN" \
              --handler handler.handler \
              --timeout 870 \
              --memory-size 512 \
              --zip-file fileb://broadcast-worker/dist/function.zip \
              --environment "$ENV_JSON"

            aws lambda wait function-active \
              --function-name "$FUNCTION_NAME"
          fi
