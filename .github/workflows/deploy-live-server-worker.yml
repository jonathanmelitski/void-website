name: Deploy Live Server Worker Lambda

on:
  push:
    branches: [main]
    paths:
      - "live-server-worker/**"
      - "nextjs/lib/aws/live-server-jobs.ts"
      - "nextjs/lib/step-types.ts"
      - ".github/workflows/deploy-live-server-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bundle
        run: |
          mkdir -p live-server-worker/dist
          node_modules/.bin/esbuild live-server-worker/handler.ts \
            --bundle \
            --platform=node \
            --target=node20 \
            --outfile=live-server-worker/dist/handler.js

      - name: Zip
        run: zip -j live-server-worker/dist/function.zip live-server-worker/dist/handler.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.VOID_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.VOID_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.VOID_REGION }}

      - name: Create or update Lambda
        env:
          FUNCTION_NAME: ${{ secrets.LIVE_SERVER_WORKER_FUNCTION_NAME }}
          ROLE_ARN: ${{ secrets.LAMBDA_WORKER_ROLE_ARN }}
        run: |
          ENV_JSON=$(jq -n \
            --arg void_key              "${{ secrets.VOID_ACCESS_KEY_ID }}" \
            --arg void_secret           "${{ secrets.VOID_SECRET_ACCESS_KEY }}" \
            --arg void_region           "${{ secrets.VOID_REGION }}" \
            --arg dynamo_table          "${{ secrets.DYNAMO_BROADCAST_TABLE }}" \
            --arg hosted_zone           "${{ secrets.ROUTE53_HOSTED_ZONE_ID }}" \
            --arg instance_profile      "${{ secrets.EC2_INSTANCE_PROFILE }}" \
            --arg instance_type         "${{ secrets.EC2_INSTANCE_TYPE }}" \
            --arg ws_secret             "${{ secrets.WS_INTERNAL_SECRET }}" \
            --arg repo_url              "${{ secrets.EC2_REPO_URL }}" \
            --arg repo_branch           "${{ secrets.EC2_REPO_BRANCH }}" \
            --arg github_token          "${{ secrets.EC2_GITHUB_TOKEN }}" \
            --arg dynamo_games          "${{ secrets.DYNAMO_GAMES_TABLE }}" \
            --arg dynamo_points         "${{ secrets.DYNAMO_POINTS_TABLE }}" \
            --arg dynamo_point_events   "${{ secrets.DYNAMO_POINT_EVENTS_TABLE }}" \
            --arg dynamo_players        "${{ secrets.DYNAMO_PLAYERS_TABLE }}" \
            '{Variables: {
              VOID_ACCESS_KEY_ID:       $void_key,
              VOID_SECRET_ACCESS_KEY:   $void_secret,
              VOID_REGION:              $void_region,
              DYNAMO_BROADCAST_TABLE:   $dynamo_table,
              ROUTE53_HOSTED_ZONE_ID:   $hosted_zone,
              EC2_INSTANCE_PROFILE:     $instance_profile,
              EC2_INSTANCE_TYPE:        $instance_type,
              WS_INTERNAL_SECRET:       $ws_secret,
              EC2_REPO_URL:             $repo_url,
              EC2_REPO_BRANCH:          $repo_branch,
              EC2_GITHUB_TOKEN:         $github_token,
              DYNAMO_GAMES_TABLE:       $dynamo_games,
              DYNAMO_POINTS_TABLE:      $dynamo_points,
              DYNAMO_POINT_EVENTS_TABLE: $dynamo_point_events,
              DYNAMO_PLAYERS_TABLE:     $dynamo_players
            }}')

          if aws lambda get-function --function-name "$FUNCTION_NAME" 2>/dev/null; then
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://live-server-worker/dist/function.zip

            aws lambda wait function-updated \
              --function-name "$FUNCTION_NAME"

            aws lambda update-function-configuration \
              --function-name "$FUNCTION_NAME" \
              --environment "$ENV_JSON"
          else
            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --runtime nodejs20.x \
              --role "$ROLE_ARN" \
              --handler handler.handler \
              --timeout 870 \
              --memory-size 512 \
              --zip-file fileb://live-server-worker/dist/function.zip \
              --environment "$ENV_JSON"

            aws lambda wait function-active \
              --function-name "$FUNCTION_NAME"
          fi
